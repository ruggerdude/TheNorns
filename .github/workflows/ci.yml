name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: norns
          POSTGRES_PASSWORD: norns
          POSTGRES_DB: norns_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U norns -d norns_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      V2_POSTGRES_TEST_URL: postgresql://norns:norns@127.0.0.1:5432/norns_test
      PHASE2_DOCKER_BACKUP_TEST: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
